version: '3.8'

services:
  kali:
    build: .
    container_name: ethical-hacking-kali
    ports:
      - "2222:22"
      - "6080:8080"
    volumes:
      - ./data:/root/data
    environment:
      - TZ=Europe/Madrid
    networks:
      - lab-network
    privileged: true

  vulnerable-services:
    image: tleemcjr/metasploitable2:latest
    container_name: target-metasploitable
    ports:
      - "2121:21"
      - "2223:22"
      - "80:80"
      - "3306:3306"
    networks:
      - lab-network
    command: sh -c "/bin/services.sh && tail -f /dev/null"
    restart: unless-stopped

networks:
  lab-network:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.56.0/24
