version: '3.8'

# LABORATORIO 7: CIBERSEGURIDAD INDUSTRIAL (ICS/SCADA)

services:
  kali:
    build: .
    container_name: ethical-hacking-kali
    ports:
      - "2222:22"
      - "6080:8080"
    volumes:
      - ./data:/root/data
    environment:
      - TZ=Europe/Madrid
    networks:
      - lab-network
    privileged: true

  # OpenPLC - PLC simulado
  openplc:
    image: openplc/plc:latest
    container_name: target-plc
    ports:
      - "8081:8080"
      - "502:502"  # Modbus
    networks:
      - lab-network
    restart: unless-stopped

networks:
  lab-network:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.62.0/24
