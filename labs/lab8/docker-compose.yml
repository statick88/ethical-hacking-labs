version: '3.8'

services:
  dvwa:
    image: vulnerables/web-dvwa
    container_name: lab8-dvwa
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=dvwa
    networks:
      lab8-net:
        ipv4_address: 172.18.8.10
    volumes:
      - dvwa-data:/var/www/html
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  db:
    image: mariadb:10.5
    container_name: lab8-db
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=dvwa
      - MYSQL_USER=dvwa
      - MYSQL_PASSWORD=password
    networks:
      lab8-net:
        ipv4_address: 172.18.8.20
    volumes:
      - db-data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  kali:
    image: kalilinux/kali-rolling
    container_name: lab8-kali
    tty: true
    stdin_open: true
    privileged: true
    networks:
      lab8-net:
        ipv4_address: 172.18.8.30
    volumes:
      - kali-data:/root
    command: tail -f /dev/null
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

networks:
  lab8-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.8.0/24

volumes:
  dvwa-data:
    driver: local
  db-data:
    driver: local
  kali-data:
    driver: local
